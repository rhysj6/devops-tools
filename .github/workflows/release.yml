name: Release

on:
  release:
    types: [published]

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build binary
      run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }}" -o devops-tools -v .
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}

    - name: Package tarball (Linux/macOS)
      if: matrix.os != 'windows'
      run: tar -czf devops-tools-${{ matrix.os }}-${{ matrix.arch }}.tar.gz devops-tools

    - name: Package tarball (Windows)
      if: matrix.os == 'windows'
      run: |
        mv devops-tools devops-tools.exe
        tar -czf devops-tools-${{ matrix.os }}-${{ matrix.arch }}.tar.gz devops-tools.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: devops-tools-${{ matrix.os }}-${{ matrix.arch }}
        path: devops-tools-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  upload-assets:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ./artifacts/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$file" --repo ${{ github.repository }}
          done

      - name: Mark release as non-prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.event.release.tag_name }} --prerelease=false --repo ${{ github.repository }}
        # Only mark as non-prerelease if the tag does not contain "rc"
        if: "!contains(github.event.release.tag_name, 'rc')"